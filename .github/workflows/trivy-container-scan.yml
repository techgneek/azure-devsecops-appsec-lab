name: Trivy Container Scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-image-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build container image from app Dockerfile
        run: docker build -t azure-devsecops-appsec-lab:ci ./app

      - name: Run Trivy image scan (table output)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/work" \
            ghcr.io/aquasecurity/trivy:latest image \
            --format table \
            --output /work/trivy-image-report.txt \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --vuln-type os,library \
            --ignore-unfixed \
            --exit-code 0 \
            azure-devsecops-appsec-lab:ci

      - name: Print Trivy report in logs
        run: cat trivy-image-report.txt

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt

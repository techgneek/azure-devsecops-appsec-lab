name: Secrets Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --verbose --redact --source .

      - name: Remediation guidance
        if: failure()
        run: |
          echo "If this scan finds a secret, remove the secret from code, rotate the value if it was real, and re-run the scan after the fix."
